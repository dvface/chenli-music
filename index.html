<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>陈粒 · 星云音乐团</title>
    <style>
        /* ============================================================
           CSS 变量 & 基础重置
           ============================================================ */
        :root {
            --bg-primary: #04060f;
            --bg-card: rgba(14, 10, 30, 0.7);
            --bg-card-hover: rgba(24, 18, 48, 0.8);
            --text-primary: #f0eaff;
            --text-secondary: #a098c8;
            --text-tertiary: #6e6498;
            --accent: #c084d8;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 22px;
            --font-stack: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --spring: cubic-bezier(0.22, 0.98, 0.36, 1);
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            width:100%; height:100%; overflow:hidden;
            font-family:var(--font-stack);
            background:var(--bg-primary);
            color:var(--text-primary);
            -webkit-tap-highlight-color:transparent;
            -webkit-font-smoothing:antialiased;
            user-select:none; -webkit-user-select:none;
        }

        /* ========== Canvas 深空背景 ========== */
        #nebulaCanvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

        /* ========== 主容器 ========== */
        .app-container {
            position:fixed; inset:0; z-index:1;
            display:flex; flex-direction:column; overflow:hidden;
        }

        /* ---------- 顶部标题栏 ---------- */
        .header {
            flex-shrink:0; padding:16px 24px 8px;
            display:flex; align-items:center; justify-content:space-between;
            z-index:10; pointer-events:none;
        }
        .header > * { pointer-events:all; }
        .header-title {
            font-size:18px; font-weight:600; letter-spacing:0.5px;
            background:linear-gradient(135deg, #e8d5ff, #b8c8ff);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .header-btn {
            width:36px; height:36px; border-radius:50%;
            border:none; background:var(--bg-card);
            color:var(--text-secondary); font-size:18px;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
            transition:all 0.25s var(--spring);
        }
        .header-btn:hover { background:var(--bg-card-hover); color:var(--text-primary); }
        .header-btn:active { transform:scale(0.92); }

        /* ---------- 星星展示区 ---------- */
        .star-stage {
            flex:1; position:relative; min-height:0; z-index:2;
        }

        /* ============================================================
           歌曲星星 — 发光圆点
           ============================================================ */
        .song-star {
            position:absolute;
            /* 视觉大小 */
            width:30px; height:30px;
            /* 扩大点击区域 */
            padding:14px;
            /* 不在这里设 transform，交给动画控制 */
            cursor:pointer; z-index:8;
            background:none; border:none;
            -webkit-tap-highlight-color:transparent;
            /* 闪烁 + 漂浮（缓慢、小幅度） */
            animation:
                starTwinkle var(--tw-dur, 3s) ease-in-out var(--tw-del, 0s) infinite,
                starFloat  var(--fl-dur, 20s) ease-in-out var(--fl-del, 0s) infinite;
            transition: opacity 0.2s ease;
        }
        .song-star:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 4px;
            border-radius: 50%;
        }
        /* 悬浮时暂停漂浮，让点击更稳定 */
        .song-star:hover {
            animation-play-state: paused, paused;
        }

        /* 星星光点 */
        .song-star::before {
            content:'';
            display:block;
            width:100%; height:100%;
            border-radius:50%;
            background:radial-gradient(circle at 40% 35%,
                rgba(255,255,255,0.95) 0%,
                var(--sc) 35%,
                transparent 70%);
            box-shadow:
                0 0 6px  var(--sc),
                0 0 14px var(--sc),
                0 0 32px var(--sg, var(--sc));
            transition: all 0.35s ease;
        }

        /* 悬浮：明亮 */
        .song-star:hover::before,
        .song-star:active::before {
            box-shadow:
                0 0 12px #fff,
                0 0 24px var(--sc),
                0 0 48px var(--sg, var(--sc)),
                0 0 72px var(--sg, var(--sc));
            transform:scale(1.5);
        }

        /* 正在播放 */
        .song-star.playing::before {
            box-shadow:
                0 0 10px #ffd25f,
                0 0 24px #ffb840,
                0 0 48px #ff8c30,
                0 0 76px #ff6c20;
            animation: playPulse 0.6s ease-in-out infinite;
        }
        .song-star.playing:hover::before {
            box-shadow:
                0 0 16px #fff,
                0 0 32px #ffd25f,
                0 0 56px #ffb840,
                0 0 84px #ff8c30;
        }

        @keyframes playPulse {
            0%,100% { transform:scale(1); }
            50% { transform:scale(1.55); }
        }

        /* 加载中 */
        .song-star.loading::before {
            animation: loadSpin 1s linear infinite;
            box-shadow:
                0 0 8px  var(--sc),
                0 0 20px var(--sc),
                0 0 40px var(--sg, var(--sc));
        }
        @keyframes loadSpin {
            0%   { transform:rotate(0deg) scale(1.15); }
            50%  { transform:rotate(180deg) scale(1.35); }
            100% { transform:rotate(360deg) scale(1.15); }
        }

        /* prefers-reduced-motion 全局适配 */
        @media (prefers-reduced-motion: reduce) {
            .song-star,
            .song-star::before,
            .song-star.playing::before,
            .song-star.loading::before {
                animation-duration: 0s !important;
                animation-delay: 0s !important;
            }
            .footer-avatar-ring {
                animation-duration: 0s !important;
            }
            .ctrl-btn,
            .tracklist-item {
                transition-duration: 0s !important;
            }
        }

        /* 歌名浮动标签 */
        .star-label {
            position:absolute; top:-30px; left:50%;
            transform:translateX(-50%) translateY(6px);
            background:rgba(8,4,22,0.92); color:#e4d8ff;
            font-size:11px; font-weight:500; padding:4px 10px; border-radius:12px;
            white-space:nowrap; pointer-events:none; letter-spacing:0.6px;
            border:1px solid rgba(140,110,200,0.2);
            opacity:0; transition:all 0.25s ease;
        }
        .song-star:hover .star-label,
        .song-star:active .star-label {
            opacity:1; transform:translateX(-50%) translateY(0);
        }

        /* 闪烁 */
        @keyframes starTwinkle {
            0%,100% { opacity:0.6; }
            50% { opacity:1; }
        }
        /* 缓慢漂浮 */
        @keyframes starFloat {
            0%,100% { transform:translate(-50%, -50%) translate(0, 0); }
            25%  { transform:translate(-50%, -50%) translate(var(--fx, 2px), var(--fy, -2px)); }
            50%  { transform:translate(-50%, -50%) translate(var(--fx2, -2px), var(--fy2, -3px)); }
            75%  { transform:translate(-50%, -50%) translate(var(--fx3, -2px), var(--fy3, -1px)); }
        }

        /* ============================================================
           底部播放器卡片
           ============================================================ */
        .player-sheet {
            flex-shrink:0; z-index:20;
            margin:0 12px calc(12px + var(--safe-bottom));
            background:var(--bg-card);
            backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
            border:1px solid rgba(140,110,200,0.2);
            border-radius:var(--radius-lg);
            padding:12px 16px;
            display:flex; flex-direction:column; gap:8px;
            opacity:0; transform:translateY(16px); pointer-events:none;
            transition:opacity 0.45s ease, transform 0.45s var(--spring);
            box-shadow:0 8px 40px rgba(0,0,0,0.45), 0 0 40px rgba(100,50,170,0.12);
        }
        .player-sheet.visible { opacity:1; transform:translateY(0); pointer-events:all; }

        .player-progress-row { display:flex; align-items:center; gap:10px; }
        .player-time-label {
            font-family:var(--font-mono); font-size:10px;
            color:var(--text-tertiary); min-width:32px; text-align:center;
        }
        .player-progress-track {
            flex:1; height:3px; border-radius:2px;
            background:rgba(120,100,170,0.25); cursor:pointer; position:relative;
        }
        .player-progress-fill {
            height:100%; border-radius:2px;
            background:linear-gradient(90deg, #a078d8, #d890c8);
            width:0%; position:relative; transition:width 0.15s linear;
        }
        .player-progress-thumb {
            position:absolute; right:-6px; top:50%; transform:translateY(-50%);
            width:12px; height:12px; border-radius:50%;
            background:#e0c8f8; box-shadow:0 0 10px rgba(200,150,230,0.5);
            opacity:0; transition:opacity 0.2s ease;
        }
        .player-progress-track:hover .player-progress-thumb { opacity:1; }

        .player-controls-row { display:flex; align-items:center; gap:12px; }
        .player-info-block { flex:1; min-width:0; }
        .player-song-title {
            font-size:14px; font-weight:600; letter-spacing:0.3px;
            color:var(--text-primary);
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .player-song-artist { font-size:11px; color:var(--text-secondary); }

        .ctrl-btn {
            width:34px; height:34px; border-radius:50%;
            border:none; background:transparent;
            color:var(--text-secondary); font-size:16px;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition:all 0.2s ease;
        }
        .ctrl-btn:hover { color:var(--text-primary); }
        .ctrl-btn:active { transform:scale(0.88); }

        .ctrl-btn.play-pause {
            width:42px; height:42px;
            background:rgba(180,130,220,0.2);
            border:1.5px solid rgba(180,140,220,0.35);
            font-size:20px; color:#e8d8ff;
            transition:all 0.3s var(--spring);
        }
        .ctrl-btn.play-pause:hover {
            background:rgba(190,140,230,0.35);
            box-shadow:0 0 20px rgba(170,120,210,0.35);
        }
        .ctrl-btn.play-pause:active { transform:scale(0.9); }

        /* ========== 歌曲列表 Sheet ========== */
        .tracklist-overlay {
            position:fixed; inset:0; z-index:30;
            background:rgba(0,0,0,0.5);
            opacity:0; pointer-events:none;
            transition:opacity 0.35s ease;
        }
        .tracklist-overlay.open { opacity:1; pointer-events:all; }

        .tracklist-sheet {
            position:fixed; bottom:0; left:0; right:0; z-index:31;
            max-height:62vh;
            background:rgba(14,10,30,0.96);
            backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
            border-radius:var(--radius-lg) var(--radius-lg) 0 0;
            padding:8px 0 calc(24px + var(--safe-bottom));
            transform:translateY(100%);
            transition:transform 0.45s var(--spring);
            display:flex; flex-direction:column;
            box-shadow:0 -8px 40px rgba(0,0,0,0.5);
        }
        .tracklist-sheet.open { transform:translateY(0); }

        .tracklist-handle {
            width:36px; height:4px; border-radius:2px;
            background:rgba(160,140,200,0.35); margin:4px auto 12px; flex-shrink:0;
        }
        .tracklist-header {
            padding:0 20px 10px; flex-shrink:0;
            font-size:15px; font-weight:600; letter-spacing:0.5px;
            color:var(--text-primary);
        }
        .tracklist-scroll {
            flex:1; overflow-y:auto; overscroll-behavior:contain; padding:0 8px;
        }
        .tracklist-item {
            display:flex; align-items:center; gap:10px;
            padding:9px 12px; border-radius:var(--radius-sm);
            cursor:pointer; transition:all 0.2s ease;
            border:none; background:none; width:100%;
            text-align:left; font-family:var(--font-stack);
            color:var(--text-primary);
        }
        .tracklist-item:hover { background:var(--bg-card-hover); }
        .tracklist-item:active { transform:scale(0.985); }
        .tracklist-num {
            width:24px; text-align:center; flex-shrink:0;
            font-size:11px; font-weight:500;
            color:var(--text-tertiary);
            font-variant-numeric:tabular-nums;
        }
        .tracklist-item.active .tracklist-num { color:var(--accent); font-weight:600; }
        .tracklist-info { flex:1; min-width:0; }
        .tracklist-name {
            font-size:13px; font-weight:500; letter-spacing:0.3px;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .tracklist-item.active .tracklist-name { color:#e8d0ff; }
        .tracklist-artist { font-size:10px; color:var(--text-tertiary); }
        .tracklist-dot {
            width:16px; height:16px; flex-shrink:0; text-align:center; font-size:12px;
        }
        .tracklist-item.active .tracklist-dot { color:var(--accent); animation:dotBounce 0.55s ease-in-out infinite; }
        @keyframes dotBounce {
            0%,100% { transform:scale(1); }
            45% { transform:scale(1.28); }
        }

        /* ========== Toast 提示 ========== */
        .toast {
            position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:50;
            padding:8px 18px; border-radius:20px;
            font-size:12px; letter-spacing:0.5px;
            opacity:0; pointer-events:none;
            transition:opacity 0.3s ease;
        }
        .toast.error { background:rgba(200,60,60,0.9); color:#fff; }
        .toast.info { background:rgba(60,60,200,0.9); color:#fff; }
        .toast.show { opacity:1; pointer-events:all; }

        /* ========== 页脚 ========== */
        .footer-dedication {
            position:fixed; bottom:8px; left:0; right:0;
            z-index:2; pointer-events:none;
            padding-bottom:var(--safe-bottom);
            display:flex; align-items:center; justify-content:center; gap:10px;
        }
        .footer-avatar-ring {
            flex-shrink:0; pointer-events:all;
            width:32px; height:32px;
            border-radius:50%;
            overflow:hidden;
            border:2px solid rgba(180,150,210,0.45);
            box-shadow:0 0 12px rgba(160,120,200,0.35), 0 0 28px rgba(140,100,190,0.18);
            animation:avatarSpin 16s linear infinite;
        }
        .footer-avatar-ring:hover {
            animation-play-state:paused;
            box-shadow:0 0 18px rgba(200,160,240,0.55), 0 0 36px rgba(160,120,210,0.3);
        }
        .footer-avatar-ring img {
            display:block; width:100%; height:100%;
            object-fit:cover; object-position:top center;
        }
        @keyframes avatarSpin {
            to { transform:rotate(360deg); }
        }
        .footer-dedication span {
            font-size:11px; font-weight:300; letter-spacing:1.5px;
            color:rgba(180,150,210,0.5);
            text-shadow:0 0 8px rgba(160,120,200,0.3);
            animation:footerGlow 5s ease-in-out infinite;
        }
        @keyframes footerGlow {
            0%,100% { text-shadow:0 0 8px rgba(160,120,200,0.3); }
            50% { text-shadow:0 0 16px rgba(160,120,200,0.55),0 0 30px rgba(120,80,180,0.2); }
        }

        /* ============================================================
           星尘歌词系统
           ============================================================ */
        .lyrics-stage {
            position:absolute; bottom:3vh; left:0; right:0;
            pointer-events:none; z-index:3;
            display:flex; flex-direction:column;
            align-items:center; gap:1.5vh;
            padding:0 6vw;
        }
        .lyrics-line {
            display:flex; flex-wrap:wrap; justify-content:center; gap:0.1em;
            transition:all 0.7s ease;
            text-align:center; width:100%;
        }
        .lyrics-line.current-line {
            opacity:1; transform:translateY(0);
        }
        .lyrics-line.current-line .lyrics-char {
            font-size:24px; font-weight:350;
            color:rgba(240,225,255,0.85);
            text-shadow:0 0 10px rgba(200,160,240,0.5),0 0 25px rgba(150,100,200,0.3);
        }
        .lyrics-line.current-line .lyrics-char.lit {
            color:#fff;
            text-shadow:0 0 14px rgba(220,180,255,0.8),0 0 35px rgba(170,120,220,0.5);
            font-weight:400;
        }
        .lyrics-line.next-line {
            opacity:0.45;
        }
        .lyrics-line.next-line .lyrics-char {
            font-size:17px; font-weight:300;
            color:rgba(180,155,215,0.7);
            text-shadow:0 0 4px rgba(140,110,180,0.2);
        }
        .lyrics-line.switch-out {
            opacity:0; transform:translateY(-8px);
            transition:all 0.5s ease-in;
        }

        /* ============================================================
           响应式
           ============================================================ */
        @media screen and (max-width:768px) {
            .header { padding:12px 16px 4px; }
            .header-title { font-size:16px; }
            .song-star { width:26px; height:26px; padding:12px; }
            .star-label { font-size:10px; top:-26px; padding:3px 8px; }
            .footer-avatar-ring { width:26px; height:26px; }
            .footer-dedication { gap:7px; }
            .player-sheet { margin:0 8px calc(8px + var(--safe-bottom)); padding:10px 12px; gap:6px; }
            .player-song-title { font-size:13px; }
            .ctrl-btn.play-pause { width:36px; height:36px; font-size:18px; }
            .ctrl-btn { width:28px; height:28px; font-size:14px; }
            .player-controls-row { gap:8px; }
            .tracklist-name { font-size:12px; }
            .tracklist-sheet { max-height:55vh; }
            .lyrics-stage { bottom:5vh; padding:0 6vw; }
            .lyrics-line.current-line .lyrics-char { font-size:20px; }
            .lyrics-line.next-line .lyrics-char { font-size:14px; }
        }
        @media screen and (max-width:400px) {
            .song-star { width:22px; height:22px; padding:10px; }
            .star-label { font-size:9px; top:-22px; }
            .footer-avatar-ring { width:22px; height:22px; }
            .player-sheet { padding:8px 10px; margin:0 4px calc(4px + var(--safe-bottom)); border-radius:14px; }
            .player-song-title { font-size:12px; }
            .tracklist-name { font-size:11px; }
            .lyrics-stage { bottom:6vh; padding:0 4vw; }
            .lyrics-line.current-line .lyrics-char { font-size:18px; }
            .lyrics-line.next-line .lyrics-char { font-size:13px; }
        }
    </style>
</head>
<body>

    <!-- ==================== 深空 Canvas 背景 ==================== -->
    <canvas id="nebulaCanvas"></canvas>

    <!-- ==================== 主容器 ==================== -->
    <div class="app-container">
        <!-- 标题栏 -->
        <header class="header">
            <span class="header-title">✦ 陈粒 · 星云音乐团</span>
            <button class="header-btn" id="tracklistToggle" aria-label="歌曲列表">☰</button>
        </header>

        <!-- 星星展示区 -->
        <div class="star-stage" id="starStage">
            <!-- 星尘歌词层 -->
            <div class="lyrics-stage" id="lyricsStage"></div>
            <!-- 歌曲星星由 JS 动态插入 -->
        </div>

        <!-- 播放器卡片 -->
        <div class="player-sheet" id="playerSheet">
            <div class="player-progress-row">
                <span class="player-time-label" id="timeCurrent">00:00</span>
                <div class="player-progress-track" id="progressTrack">
                    <div class="player-progress-fill" id="progressFill">
                        <div class="player-progress-thumb"></div>
                    </div>
                </div>
                <span class="player-time-label" id="timeTotal">00:00</span>
            </div>
            <div class="player-controls-row">
                <div class="player-info-block">
                    <div class="player-song-title" id="playerTitle">选择一颗星星</div>
                    <div class="player-song-artist">陈粒</div>
                </div>
                <button class="ctrl-btn" id="btnPrev" title="上一首" aria-label="上一首">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="19 20 9 12 19 4"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button class="ctrl-btn play-pause" id="btnPlay" title="播放" aria-label="播放">
                    <svg id="playIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21"/></svg>
                    <svg id="pauseIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                <button class="ctrl-btn" id="btnNext" title="下一首" aria-label="下一首">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 4 15 12 5 20"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
                <button class="ctrl-btn" id="btnVolume" title="音量" aria-label="音量">
                    <svg id="volOn" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    <svg id="volOff" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== 歌曲列表 Sheet ==================== -->
    <div class="tracklist-overlay" id="tracklistOverlay"></div>
    <div class="tracklist-sheet" id="tracklistSheet">
        <div class="tracklist-handle"></div>
        <div class="tracklist-header">🎵 歌曲列表 · 共 <span id="tracklistCount">16</span> 首</div>
        <div class="tracklist-scroll" id="tracklistScroll"></div>
    </div>

    <!-- ==================== Toast ==================== -->
    <div class="toast error" id="toastError"></div>

    <script>
    (function(){
        'use strict';

        // ============================================================
        // 歌曲数据 — 16 首陈粒热门歌曲
        // ============================================================
        const SONG_DATA = [
            { name:'奇妙能力歌',            file:'奇妙能力歌 - 陈粒.mp3',              nid:'461347998', color:'#c4b5fd' },
            { name:'走马',                  file:'走马 - 陈粒.mp3',                    nid:'30431367',   color:'#67e8f9' },
            { name:'易燃易爆炸',            file:'易燃易爆炸 - 陈粒.mp3',              nid:'461544197', color:'#f9a8d4' },
            { name:'光',                    file:'光 - 陈粒.mp3',                      nid:'30431368',   color:'#fde68a' },
            { name:'如也',                  file:'如也 - 陈粒.mp3',                    nid:'30431365',   color:'#a5f3fc' },
            { name:'历历万乡',              file:'历历万乡 - 陈粒.mp3',                nid:'30431369',   color:'#d8b4fe' },
            { name:'小半',                  file:'小半 - 陈粒.mp3',                    nid:'421423806', color:'#fbbf7c' },
            { name:'虚拟',                  file:'虚拟 - 陈粒.mp3',                    nid:'422094356', color:'#e8c8ff' },
            { name:'芳草地',                file:'芳草地 - 陈粒.mp3',                  nid:'421423808', color:'#86efac' },
            { name:'桥豆麻袋',              file:'桥豆麻袋 - 陈粒.mp3',                nid:'422094357', color:'#fca5a5' },
            { name:'性空山',                file:'性空山 - 陈粒.mp3',                  nid:'30051774',   color:'#d4a5fc' },
            { name:'望穿',                  file:'望穿 - 陈粒.mp3',                    nid:'1335907602',color:'#67d8f9' },
            { name:'空空',                  file:'空空 - 陈粒.mp3',                    nid:'1487653554',color:'#93c5fd' },
            { name:'世界正中',              file:'世界正中 - 陈粒.mp3',                nid:'1477379550',color:'#fcd34d' },
            { name:'爱似流星',              file:'爱似流星 - 陈粒.mp3',                nid:'1487653555',color:'#fda4af' },
            { name:'绝对占有 相对自由',     file:'绝对占有 相对自由 (DJ QüarkLiu版) - 陈粒.mp3', nid:'1487653556',color:'#c7d2fe' },
        ];

        const ARTIST_NAME = '陈粒';

        // ============================================================
        // DOM 缓存
        // ============================================================
        const $ = (s,c) => (c||document).querySelector(s);

        const nebulaCanvas = $('#nebulaCanvas');

        const tracklistScroll = $('#tracklistScroll');
        const tracklistCount = $('#tracklistCount');

        // ============================================================
        // 状态
        // ============================================================
        let currentIndex = -1;
        let isPlaying = false;
        let isMuted = false;
        let songStars = [];
        let tracklistItems = [];
        let toastTimer = null;
        let isLoading = false;           // 加载中标记

        // ============================================================
        // CANVAS 深空背景引擎（增强版）
        // ============================================================
        const particles = [];
        const PARTICLE_COUNT = 350;

        class SpaceParticle {
            constructor(init) {
                this.reset(init);
            }
            reset(init) {
                this.x = init ? Math.random() * nebulaCanvas.width : -30;
                this.y = init ? Math.random() * nebulaCanvas.height : Math.random() * nebulaCanvas.height;
                const a = Math.random() * Math.PI * 2;
                const s = 0.04 + Math.random() * 0.35;
                this.vx = Math.cos(a) * s;
                this.vy = Math.sin(a) * s - 0.08;
                this.r = Math.random() * 1.8 + 0.15;
                this.life = 1;
                this.decay = 0.00018 + Math.random() * 0.0007;
                this.phase = Math.random() * Math.PI * 2;
                this.phaseSpeed = 0.006 + Math.random() * 0.022;
                // 色板：蓝紫 / 青 / 暖金 / 粉紫
                const pal = [
                    [140,100,220],[50,160,195],[190,130,80],
                    [85,125,210],[210,165,100],[170,110,195],
                    [100,145,215],[60,180,185],[200,155,115],
                ];
                this.color = pal[Math.floor(Math.random()*pal.length)];
                this.isBright = Math.random() > 0.85;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= this.decay; this.phase += this.phaseSpeed;
                if (this.life <= 0 || this.x < -40 || this.x > nebulaCanvas.width+40
                    || this.y < -40 || this.y > nebulaCanvas.height+40) this.reset(false);
            }
            draw(c) {
                const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(this.phase));
                const alpha = this.life * twinkle;
                const [r,g,b] = this.color;
                // 星点
                c.beginPath();
                c.arc(this.x, this.y, this.r, 0, Math.PI*2);
                c.fillStyle = `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
                c.fill();
                // 亮星 + 柔和光晕
                if (this.isBright && this.r > 1.0) {
                    c.beginPath();
                    c.arc(this.x, this.y, this.r*3.5, 0, Math.PI*2);
                    c.fillStyle = `rgba(${r},${g},${b},${(alpha*0.12).toFixed(2)})`;
                    c.fill();
                }
            }
        }

        function resizeCanvas() {
            nebulaCanvas.width = window.innerWidth;
            nebulaCanvas.height = window.innerHeight;
        }

        function drawNebulaClouds() {
            const w = nebulaCanvas.width, h = nebulaCanvas.height;
            const cx = w/2, cy = h/2;
            // 6 层星云雾气
            const clouds = [
                [cx*0.50, cy*0.60, 'rgba(70,25,135,0.09)', 'rgba(35,10,70,0.03)', w*0.58],
                [cx*1.40, cy*0.30, 'rgba(15,105,145,0.08)', 'rgba(6,45,65,0.02)', w*0.50],
                [cx*0.35, cy*1.45, 'rgba(145,30,85,0.06)',  'rgba(65,15,38,0.02)', w*0.44],
                [cx,      cy,      'rgba(110,70,195,0.05)', 'transparent',         w*0.38],
                [cx*1.20, cy*1.15, 'rgba(30,90,170,0.06)',  'rgba(15,40,80,0.02)', w*0.40],
                [cx*0.75, cy*0.25, 'rgba(90,40,160,0.05)',  'rgba(40,18,70,0.02)', w*0.35],
            ];
            clouds.forEach(([x,y,c1,c2,r]) => {
                const grad = ctx.createRadialGradient(x, y, 20, cx, cy, r);
                grad.addColorStop(0, c1);
                grad.addColorStop(0.55, c2);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fillRect(0,0,w,h);
            });
        }

        function animateCanvas() {
            ctx.fillStyle = '#04060f';
            ctx.fillRect(0,0,nebulaCanvas.width,nebulaCanvas.height);
            drawNebulaClouds();
            particles.forEach(p => { p.update(); p.draw(ctx); });
            requestAnimationFrame(animateCanvas);
        }

        function initCanvas() {
            resizeCanvas();
            particles.length = 0;
            for (let i=0; i<PARTICLE_COUNT; i++) particles.push(new SpaceParticle(true));
            animateCanvas();
            window.addEventListener('resize', () => resizeCanvas());
        }

        // ============================================================
        // Toast 提示
        // ============================================================
        function showToast(msg, type='error') {
            const el = type === 'info' ? toastInfo : toastError;
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
        }

        // ============================================================
        // 音频引擎
        // ============================================================
        function fmtTime(s) {
            if (!isFinite(s) || isNaN(s) || s<0) return '00:00';
            const m = Math.floor(s/60), sec = Math.floor(s%60);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function getAudioPath(index) {
            if (index < 0 || index >= SONG_DATA.length) return '';
            return AUDIO_DIR + SONG_DATA[index].file;
        }

        // ============================================================
        // 智能播放引擎 — 双路径加载 + 防竞态
        // 始终只使用 audio/ 文件夹中的自有 MP3，绝不从第三方抓取
        // ============================================================
        let playAttemptId = 0;        // 防止快速切歌竞态
        const LOAD_TIMEOUT = 8000;    // 8 秒加载超时

        function tryPlayPath(path, attemptId) {
            return new Promise((resolve) => {
                let settled = false;
                const finish = (result) => {
                    if (settled) return;
                    settled = true;
                    clearTimeout(timer);
                    cleanup();
                    resolve(playAttemptId === attemptId ? result : false);
                };

                const timer = setTimeout(() => finish(false), LOAD_TIMEOUT);
                const onErr = () => finish(false);
                const cleanup = () => {
                    audioEl.removeEventListener('error', onErr);
                };

                audioEl.addEventListener('error', onErr, { once: true });
                audioEl.src = path;
                audioEl.load();

                // 关键：同步调用 play()，保持在用户点击手势上下文中
                // 若放在 canplay 回调里则手势已过期，浏览器会拒绝播放
                const p = audioEl.play();
                if (p && p.then) {
                    p.then(() => finish(true), () => finish(false));
                } else {
                    finish(true); // 旧浏览器 play() 不返回 Promise
                }
            });
        }

        function setStarLoading(index, loading) {
            if (index >= 0 && index < songStars.length) {
                songStars[index].classList.toggle('loading', loading);
            }
        }

        async function playSong(index) {
            if (index < 0 || index >= SONG_DATA.length) return;

            // 同一首歌且已加载 → 切换播放/暂停
            if (index === currentIndex && audioEl.src && audioEl.readyState > 0) {
                togglePlay();
                return;
            }

            // 递增版本号，使之前的加载请求失效
            playAttemptId++;
            const myAttemptId = playAttemptId;
            const prevIndex = currentIndex;

            // 清除旧星加载状态
            setStarLoading(prevIndex, false);

            currentIndex = index;
            isLoading = true;
            const song = SONG_DATA[index];

            playerTitle.textContent = song.name;
            playerSheet.classList.add('visible');
            updateTracklistActive();
            updatePlayingStar();
            setStarLoading(index, true);  // 显示加载指示

            audioEl.dataset.songIndex = index;
            audioEl.dataset.loading = 'true';

            const fileName = song.file;
            let success = false;

            // 路径1: 相对路径 — 本地和 GitHub Pages 均适用
            const relativePath = AUDIO_DIR + fileName;
            success = await tryPlayPath(relativePath, myAttemptId);

            // 路径2: 同源绝对路径 — 处理中文文件名编码差异
            if (!success && playAttemptId === myAttemptId && window.location.protocol !== 'file:') {
                const baseUrl = window.location.origin + window.location.pathname;
                const absolutePath = baseUrl + AUDIO_DIR + encodeURI(fileName);
                console.log('相对路径失败，尝试同源绝对路径:', absolutePath);
                success = await tryPlayPath(absolutePath, myAttemptId);
            }

            // 请求已过期 → 静默退出
            if (playAttemptId !== myAttemptId) {
                audioEl.dataset.loading = 'false';
                return;
            }

            audioEl.dataset.loading = 'false';
            isLoading = false;
            setStarLoading(index, false);

            if (success) {
                isPlaying = true;
                updatePlayBtn();
                updatePlayingStar();
                startLyrics();
                console.log('✅ 播放成功:', fileName);
            } else {
                isPlaying = false;
                updatePlayBtn();
                updatePlayingStar();
                if (window.location.protocol === 'file:') {
                    showToast('⚠️ 找不到文件，请确认 audio/ 中有 ' + fileName);
                } else {
                    showToast('⚠️ 加载失败，请刷新页面后重试 [' + fileName + ']');
                }
                console.error('❌ 播放失败:', relativePath);
            }
        }

        function togglePlay() {
            if (currentIndex < 0) return;
            if (isPlaying) {
                audioEl.pause();
            } else {
                audioEl.play().catch(e => {
                    showToast('⚠️ 播放被阻止，请再次点击播放');
                    updatePlayBtn();
                });
            }
        }

        function playPrev() {
            if (currentIndex < 0) { playSong(SONG_DATA.length-1); return; }
            playSong((currentIndex - 1 + SONG_DATA.length) % SONG_DATA.length);
        }

        function playNext() {
            if (currentIndex < 0) { playSong(0); return; }
            playSong((currentIndex + 1) % SONG_DATA.length);
        }

        function updatePlayBtn() {
            if (isPlaying) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = '';
            } else {
                playIcon.style.display = '';
                pauseIcon.style.display = 'none';
            }
        }

        function updatePlayingStar() {
            songStars.forEach((el,i) => {
                el.classList.toggle('playing', i === currentIndex && isPlaying);
            });
        }

        // 音频事件
        audioEl.addEventListener('loadedmetadata', () => {
            timeTotal.textContent = fmtTime(audioEl.duration);
        });
        audioEl.addEventListener('timeupdate', () => {
            if (audioEl.duration && isFinite(audioEl.duration)) {
                progressFill.style.width = (audioEl.currentTime / audioEl.duration * 100) + '%';
                timeCurrent.textContent = fmtTime(audioEl.currentTime);
            }
        });
        audioEl.addEventListener('play', () => {
            isPlaying = true; updatePlayBtn(); updatePlayingStar();
            playerSheet.classList.add('visible');
        });
        audioEl.addEventListener('pause', () => {
            isPlaying = false; updatePlayBtn(); updatePlayingStar();
        });
        audioEl.addEventListener('ended', () => {
            isPlaying = false; updatePlayBtn(); updatePlayingStar();
            progressFill.style.width = '0%';
            timeCurrent.textContent = '00:00';
            playNext();
        });
        audioEl.addEventListener('error', () => {
            // 仅处理播放中途的意外错误；加载阶段的错误由 playSong 处理
            if (audioEl.dataset.loading === 'true') return;
            if (!audioEl.src || audioEl.src === window.location.href) return;
            isPlaying = false; updatePlayBtn(); updatePlayingStar();
            showToast('⚠️ 播放中断，请重试');
        });
        audioEl.volume = 0.72;

        // 按钮事件
        btnPlay.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentIndex < 0) playSong(0);
            else togglePlay();
        });
        btnPrev.addEventListener('click', (e) => { e.stopPropagation(); playPrev(); });
        btnNext.addEventListener('click', (e) => { e.stopPropagation(); playNext(); });
        btnVolume.addEventListener('click', (e) => {
            e.stopPropagation();
            isMuted = !isMuted;
            audioEl.muted = isMuted;
            volOnIcon.style.display = isMuted ? 'none' : '';
            volOffIcon.style.display = isMuted ? '' : 'none';
        });

        progressTrack.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!audioEl.duration || !isFinite(audioEl.duration)) return;
            const rect = progressTrack.getBoundingClientRect();
            const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            audioEl.currentTime = ratio * audioEl.duration;
        });

        // ============================================================
        // 星尘歌词系统
        // ============================================================
        const lyricsStage = document.getElementById('lyricsStage');
        const LYRICS_LEAD = 0.55;
        let lyricsData = [];
        let currentLineEl = null;
        let nextLineEl = null;
        let activeIdx = -1;
        let lyricsRAF = null;
        let lyricsSongIdx = -1;       // 当前歌词所属歌曲，防止竞态

        function parseLRC(text) {
            const lines = [];
            const re = /\[(\d{2}):(\d{2})[\.:](\d{2,3})\]/g;
            let offset = 0;
            for (const raw of text.split('\n')) {
                const t = raw.trim();
                if (!t) continue;
                const om = t.match(/^\[offset:\s*(-?\d+)\]/i);
                if (om) { offset = parseInt(om[1]) / 1000; continue; }
                if (/^\[(ar|ti|al|by|total|hash|qq|sign):/.test(t)) continue;
                const times = []; let m;
                while ((m = re.exec(t)) !== null) {
                    const sec = parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/(m[3].length===2?100:1000);
                    times.push(sec + offset);
                }
                const txt = t.replace(re, '').trim();
                if (txt && times.length) times.forEach(s => lines.push({ time:s, text:txt }));
            }
            lines.sort((a,b) => a.time - b.time);
            return lines.filter((l,i) => i===0 || l.text !== lines[i-1].text || l.time - lines[i-1].time > 0.35);
        }

        function buildLineEl(text, className) {
            const el = document.createElement('div');
            el.className = 'lyrics-line ' + className;
            [...text].forEach(ch => {
                const sp = document.createElement('span');
                sp.className = 'lyrics-char'; sp.textContent = ch;
                el.appendChild(sp);
            });
            return el;
        }

        async function loadLyrics(songIdx) {
            const song = SONG_DATA[songIdx];
            if (!song) return;
            if (songIdx !== currentIndex) return;  // 歌曲已切换，中止
            try {
                const resp = await fetch(AUDIO_DIR + song.file.replace('.mp3', '.lrc'));
                if (!resp.ok) throw new Error('no lrc');
                if (songIdx !== currentIndex) return;  // 解析前再检查
                lyricsData = parseLRC(await resp.text());
            } catch(e) { lyricsData = []; }
            if (songIdx !== currentIndex) return;      // 最终检查

            lyricsSongIdx = songIdx;
            lyricsStage.innerHTML = '';
            currentLineEl = null; nextLineEl = null; activeIdx = -1;

            if (lyricsData.length) {
                currentLineEl = buildLineEl(lyricsData[0].text, 'current-line');
                lyricsStage.appendChild(currentLineEl);
                if (lyricsData.length > 1) {
                    nextLineEl = buildLineEl(lyricsData[1].text, 'next-line');
                    lyricsStage.appendChild(nextLineEl);
                }
            }
        }

        function updateLyrics() {
            // 歌曲已切换或无歌词 → 停止 RAF，不再循环
            if (lyricsSongIdx !== currentIndex || !lyricsData.length) {
                lyricsRAF = null; return;
            }
            const t = audioEl.currentTime + LYRICS_LEAD;
            let newIdx = -1;
            for (let i = lyricsData.length-1; i >= 0; i--) {
                if (t >= lyricsData[i].time) { newIdx = i; break; }
            }
            if (newIdx !== activeIdx && newIdx >= 0) {
                if (activeIdx >= 0) switchLine(newIdx);
                activeIdx = newIdx;
            }
            if (currentLineEl && activeIdx >= 0) {
                const item = lyricsData[activeIdx];
                const chars = currentLineEl.querySelectorAll('.lyrics-char');
                const nextItem = (activeIdx+1 < lyricsData.length) ? lyricsData[activeIdx+1] : null;
                const duration = nextItem ? Math.max(1.0, nextItem.time - item.time) : 4;
                chars.forEach((sp, ci) => {
                    const charTime = item.time + (ci / chars.length) * duration;
                    sp.classList.toggle('lit', t >= charTime);
                });
            }
            lyricsRAF = requestAnimationFrame(updateLyrics);
        }

        function switchLine(newIdx) {
            if (!currentLineEl) return;
            currentLineEl.classList.add('switch-out');
            const old = currentLineEl;
            setTimeout(() => old.remove(), 500);
            if (nextLineEl) {
                nextLineEl.classList.remove('next-line');
                nextLineEl.classList.add('current-line');
                nextLineEl.querySelectorAll('.lyrics-char').forEach(s => s.classList.remove('lit'));
            }
            currentLineEl = nextLineEl;
            if (!currentLineEl) {
                currentLineEl = buildLineEl(lyricsData[newIdx].text, 'current-line');
                lyricsStage.appendChild(currentLineEl);
            }
            const nxt = newIdx + 1;
            if (nxt < lyricsData.length) {
                nextLineEl = buildLineEl(lyricsData[nxt].text, 'next-line');
                lyricsStage.appendChild(nextLineEl);
            } else {
                nextLineEl = null;
            }
        }

        async function startLyrics() {
            if (lyricsRAF) { cancelAnimationFrame(lyricsRAF); lyricsRAF = null; }
            lyricsData = []; activeIdx = -1;
            lyricsSongIdx = -1;
            lyricsStage.innerHTML = '';
            currentLineEl = null; nextLineEl = null;
            const songIdx = currentIndex;
            await loadLyrics(songIdx);
            if (songIdx === currentIndex && lyricsData.length) {
                updateLyrics();
            }
        }

        // ============================================================
        // 歌曲星星系统 — 有机散布 + 漂浮动画
        // ============================================================
        function randomBetween(a, b) { return a + Math.random() * (b - a); }

        /** 计算星星在舞台中的有机分布位置 */
        function calcStarPositions() {
            const count = SONG_DATA.length;
            const rect = starStage.getBoundingClientRect();
            const stageW = rect.width;
            const stageH = rect.height;
            const cx = stageW / 2;
            const cy = stageH / 2;
            const maxR = Math.min(stageW, stageH) * 0.40;

            // 使用黄金角度螺旋 + sqrt 分布，保证均匀自然的散布
            const goldenAngle = 2.3999632;
            return SONG_DATA.map((_, i) => {
                const angle = i * goldenAngle;
                // sqrt 让径向分布更均匀（避免中心过密）
                const radius = maxR * Math.sqrt((i + 0.7) / count);
                // 加一点随机抖动让布局更自然
                const jitterX = randomBetween(-8, 8);
                const jitterY = randomBetween(-8, 8);
                return {
                    x: cx + Math.cos(angle) * radius + jitterX,
                    y: cy + Math.sin(angle) * radius + jitterY,
                };
            });
        }

        /** 为每颗星星生成独特的漂浮动画参数 */
        function randomFloatParams() {
            const signX = Math.random() > 0.5 ? 1 : -1;
            const signY = Math.random() > 0.5 ? 1 : -1;
            return {
                fx:  (1 + Math.random() * 3) * signX,
                fy:  (1 + Math.random() * 3) * signY,
                fx2: (1 + Math.random() * 3) * -signX,
                fy2: (1 + Math.random() * 3) * -signY,
                fx3: (1 + Math.random() * 2) * (Math.random() > 0.5 ? 1 : -1),
                fy3: (1 + Math.random() * 2) * (Math.random() > 0.5 ? 1 : -1),
                fld: 18 + Math.random() * 16,    // 漂浮周期 18-34s（更慢）
                twd: 2.5 + Math.random() * 3.5,   // 闪烁周期 2.5-6s
            };
        }

        function createSongStars() {
            // 清除旧星星
            songStars.forEach(s => s.remove());
            songStars = [];
            const positions = calcStarPositions();

            SONG_DATA.forEach((song, i) => {
                const {x, y} = positions[i];
                const fp = randomFloatParams();

                const btn = document.createElement('button');
                btn.className = 'song-star';
                btn.setAttribute('aria-label', song.name);
                btn.style.left = x + 'px';
                btn.style.top = y + 'px';
                btn.style.setProperty('--sc', song.color);
                btn.style.setProperty('--sg', song.color + '88');
                btn.style.setProperty('--fx', fp.fx + 'px');
                btn.style.setProperty('--fy', fp.fy + 'px');
                btn.style.setProperty('--fx2', fp.fx2 + 'px');
                btn.style.setProperty('--fy2', fp.fy2 + 'px');
                btn.style.setProperty('--fx3', fp.fx3 + 'px');
                btn.style.setProperty('--fy3', fp.fy3 + 'px');
                btn.style.setProperty('--fl-dur', fp.fld + 's');
                btn.style.setProperty('--tw-dur', fp.twd + 's');
                btn.style.setProperty('--fl-del', (Math.random() * -10).toFixed(1) + 's');
                btn.style.setProperty('--tw-del', (Math.random() * -3).toFixed(1) + 's');

                // 歌名标签
                const label = document.createElement('span');
                label.className = 'star-label';
                label.textContent = song.name;
                btn.appendChild(label);

                // 点击事件
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    playSong(i);
                });

                // 移动端触摸显示标签
                btn.addEventListener('touchstart', () => {
                    label.style.opacity = '1';
                    label.style.transform = 'translateX(-50%) translateY(0)';
                    clearTimeout(btn._tt);
                    btn._tt = setTimeout(() => {
                        label.style.opacity = '';
                        label.style.transform = '';
                    }, 1600);
                }, {passive:true});

                starStage.appendChild(btn);
                songStars.push(btn);
            });
        }

        // ============================================================
        // 歌曲列表 Sheet
        // ============================================================
        function buildTracklist() {
            tracklistScroll.innerHTML = '';
            tracklistItems = [];
            tracklistCount.textContent = SONG_DATA.length;

            SONG_DATA.forEach((song, i) => {
                const item = document.createElement('button');
                item.className = 'tracklist-item';
                item.innerHTML = `
                    <span class="tracklist-num">${(i+1).toString().padStart(2,'0')}</span>
                    <span class="tracklist-info">
                        <div class="tracklist-name">${song.name}</div>
                        <div class="tracklist-artist">${song.artist || ARTIST_NAME}</div>
                    </span>
                    <span class="tracklist-dot">♪</span>
                `;
                item.addEventListener('click', () => playSong(i));
                tracklistScroll.appendChild(item);
                tracklistItems.push(item);
            });
            updateTracklistActive();
        }

        function updateTracklistActive() {
            tracklistItems.forEach((item, i) => {
                item.classList.toggle('active', i === currentIndex);
                const dot = item.querySelector('.tracklist-dot');
                if (dot) dot.textContent = (i === currentIndex && isPlaying) ? '♪' : '';
            });
        }

        function openTracklist() {
            tracklistOverlay.classList.add('open');
            tracklistSheet.classList.add('open');
        }
        function closeTracklist() {
            tracklistOverlay.classList.remove('open');
            tracklistSheet.classList.remove('open');
        }
        tracklistToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            tracklistOverlay.classList.contains('open') ? closeTracklist() : openTracklist();
        });
        tracklistOverlay.addEventListener('click', closeTracklist);

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            switch(e.code) {
                case 'Space': e.preventDefault();
                    if (currentIndex<0) playSong(0); else togglePlay(); break;
                case 'ArrowLeft':  e.preventDefault(); playPrev(); break;
                case 'ArrowRight': e.preventDefault(); playNext(); break;
                case 'ArrowUp':    e.preventDefault(); audioEl.volume = Math.min(1, audioEl.volume+0.1); break;
                case 'ArrowDown':  e.preventDefault(); audioEl.volume = Math.max(0, audioEl.volume-0.1); break;
                case 'KeyM':       e.preventDefault();
                    isMuted=!isMuted; audioEl.muted=isMuted;
                    volOnIcon.style.display=isMuted?'none':'';
                    volOffIcon.style.display=isMuted?'':'none'; break;
            }
        });

        // 响应式：窗口大小变化时重新计算星星位置
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                const positions = calcStarPositions();
                songStars.forEach((el, i) => {
                    const p = positions[i];
                    el.style.left = p.x + 'px';
                    el.style.top = p.y + 'px';
                });
            }, 300);
        });

        // ============================================================
        // 启动
        // ============================================================
        function init() {
            initCanvas();
            createSongStars();
            buildTracklist();
            audioEl.volume = 0.72;

            console.log('%c🌟 陈粒 · 星云音乐团 %c已就绪',
                'font-size:16px;color:#d8b0f0;', '');
            console.log('%c   🎵 16首 · 纯本地MP3播放 | 不依赖在线API', 'color:#a89cc8;');
            console.log('%c   ✨ 点击星星 → 播放 | ⌨ 空格 → 暂停 | ←→ 切歌 | ↑↓ 音量',
                'color:#a89cc8;');
        }

        init();
    })();
    </script>
</body>
</html>
